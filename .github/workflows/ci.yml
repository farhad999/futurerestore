name: Futurerestore

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 1 *'
    - cron: '0 0 1 4 *'
    - cron: '0 0 30 6 *'
    - cron: '0 0 28 9 *'
    - cron: '0 0 27 12 *'

jobs:
  Linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        id: Checkout
        uses: actions/checkout@v2
        with:
          submodules: 'true'
          fetch-depth: 0
          
      - name: Linux Build
        id: Linux
        uses: addnab/docker-run-action@v3
        with:
          image: debian:buster-slim
          options: -v ${{ github.workspace }}/..:/tmp/Builder/repos/
          run: |
            /tmp/Builder/repos/futurerestore/.github/workflows/linux-bootstrap.sh
            /tmp/Builder/repos/futurerestore/.github/workflows/linux-build.sh
            /tmp/Builder/repos/futurerestore/.github/workflows/linux-post.sh
            
      - name: Locate and Extract Binary
        id: extract-binary
        run: |
          # Change ownership permissions back to host runner
          sudo chown -R $USER:$USER ${{ github.workspace }}/../
          
          # Create a dedicated extraction directory
          mkdir -p ${{ github.workspace }}/output/
          
          # Find the compiled binary from Docker volumes and copy it cleanly
          find ${{ github.workspace }}/../ -name "futurerestore" -type f -exec cp {} ${{ github.workspace }}/output/ \; 2>/dev/null || true
          
          # Also look for any zipped archives created by the repository scripts as fallback
          find ${{ github.workspace }}/../ -name "futurerestore*.tar.xz" -type f -exec cp {} ${{ github.workspace }}/output/ \; 2>/dev/null || true

      - name: Upload Compiled FutureRestore Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: futurerestore-Linux-x86_64
          path: ${{ github.workspace }}/output/
          if-no-files-found: error
