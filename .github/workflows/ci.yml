name: Futurerestore

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 1 *'
    - cron: '0 0 1 4 *'
    - cron: '0 0 30 6 *'
    - cron: '0 0 28 9 *'
    - cron: '0 0 27 12 *'

jobs:
  Linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        id: Checkout
        uses: actions/checkout@v2
        with:
          submodules: 'true'
          fetch-depth: 0
          
      - name: Linux Build
        id: Linux
        uses: addnab/docker-run-action@v3
        with:
          image: debian:buster-slim
          options: -v ${{ github.workspace }}/..:/tmp/Builder/repos/
          run: |
            # Hotfix for Debian Buster EOL repositories
            sed -i s/deb.debian.org/archive.debian.org/g /etc/apt/sources.list
            sed -i s/security.debian.org/archive.debian.org/g /etc/apt/sources.list
            sed -i '/stretch-updates/d' /etc/apt/sources.list || true
            sed -i '/buster-updates/d' /etc/apt/sources.list || true
            
            # 1. Run bootstrap to compile underlying dependencies
            /tmp/Builder/repos/futurerestore/.github/workflows/linux-bootstrap.sh
            
            # 2. Enter workspace and force clean configuration
            cd /tmp/Builder/repos/futurerestore/
            rm -rf cmake-build-release-x86_64
            mkdir -p cmake-build-release-x86_64 && cd cmake-build-release-x86_64
            
            # Compile with exact header assignments
            cmake .. \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INCLUDE_PATH="/tmp/Builder/repos/futurerestore/dep_root/include" \
              -DCMAKE_LIBRARY_PATH="/tmp/Builder/repos/futurerestore/dep_root/lib" \
              -DPKG_CONFIG_EXECUTABLE=/usr/bin/pkg-config \
              -DCMAKE_C_FLAGS="-I/tmp/Builder/repos/futurerestore/dep_root/include" \
              -DCMAKE_CXX_FLAGS="-I/tmp/Builder/repos/futurerestore/dep_root/include"
            
            # 3. Build explicitly
            make -j$(nproc)
            
            # 4. Force copy any binary found inside this build folder directly into the root repo folder
            find . -type f -name "futurerestore" -exec cp {} /tmp/Builder/repos/futurerestore/ \; || true

      - name: Locate and Extract Binary
        id: extract-binary
        run: |
          sudo chown -R $USER:$USER ${{ github.workspace }}/../
          mkdir -p ${{ github.workspace }}/output/
          
          # Print the file structure to the action log so we can debug if it goes missing
          echo "=== Debugging file locations ==="
          find ${{ github.workspace }}/../ -name "futurerestore" -type f || echo "No binary found at all"
          
          # Force copy any matched items from the runner's workspace volume mapping
          find ${{ github.workspace }}/../ -name "futurerestore" -type f -exec cp {} ${{ github.workspace }}/output/ \; 2>/dev/null || true
          
          # Verify file copy execution
          ls -la ${{ github.workspace }}/output/ || echo "Output directory is completely empty"

      - name: Upload Compiled FutureRestore Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: futurerestore-Linux-x86_64
          path: ${{ github.workspace }}/output/
          if-no-files-found: error
